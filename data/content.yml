home:
  title: The concept
  paragraphs:
    - >
      hEART is the European Association for Research in Transportation.
      Its objective is to promote excellence in transportation research
      in Europe, with a strong emphasis on the promotion of PhD students
      and young researchers. Member institutions are conducting doctoral
      education and research.

    - >
      The main activities of the association are the organization of an
      annual international conference for the transportation research
      community, and networking and exchange of information among the
      members.